<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Guide | Peak Tyler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        h1, h2, h3, .heading-font { font-family: 'Space Grotesk', sans-serif; }

        .topo-bg {
            background-color: #f3f4f6;
            background-image: url("data:image/svg+xml,%3Csvg width='100%' height='100%' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='topoPattern' patternUnits='userSpaceOnUse' width='500' height='500' viewBox='0 0 500 500'%3E%3Cpath d='M0 250 Q 125 100, 250 250 Q 375 400, 500 250 M0 270 Q 125 120, 250 270 Q 375 420, 500 270 M0 230 Q 125 80, 250 230 Q 375 380, 500 230 M0 300 Q 125 150, 250 300 Q 375 450, 500 300 M0 200 Q 125 50, 250 200 Q 375 350, 500 200 M0 350 Q 125 200, 250 350 Q 375 500, 500 350 M0 150 Q 125 0, 250 150 Q 375 300, 500 150' stroke='%239ca3af' stroke-opacity='0.3' fill='none' stroke-width='1.5'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='100%' height='100%' fill='url(%23topoPattern)'/%3E%3C/svg%3E");
            background-size: 500px 500px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="topo-bg overflow-x-hidden" x-data="{ currentView: 'PNW', ...guideData() }">

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 bg-gray-900/90 backdrop-blur-md py-4 shadow-lg">
        <div class="flex justify-center gap-6">
            <button @click="currentView = 'PNW'" :class="currentView === 'PNW' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm hover:text-orange-400 transition">PNW</button>
            <button @click="currentView = 'ICELAND'" :class="currentView === 'ICELAND' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm hover:text-orange-400 transition">Iceland</button>
            <button @click="currentView = 'SWITZERLAND'" :class="currentView === 'SWITZERLAND' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm hover:text-orange-400 transition">Switzerland</button>
            <button @click="currentView = 'DOLOMITES'" :class="currentView === 'DOLOMITES' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm hover:text-orange-400 transition">Dolomites</button>
        </div>
    </nav>

    <!-- CONTENT AREAS -->
    <main class="pt-28 pb-16 px-4 max-w-3xl mx-auto">
        
        <!-- PNW SECTION -->
        <section x-show="currentView === 'PNW'" class="gs-reveal">
            <div class="glass-panel rounded-2xl p-8 shadow-sm">
                <h1 class="text-4xl font-bold heading-font text-gray-900">PNW Field Guide</h1>
                <p class="text-gray-600 mt-4 leading-relaxed">This is the original PNW design. You can paste your carousel code and itinerary lists right here, and they will retain all their original styling.</p>
            </div>
        </section>

        <!-- ICELAND SECTION -->
        <section x-show="currentView === 'ICELAND'" class="gs-reveal">
            <div class="glass-panel rounded-2xl p-8 shadow-sm">
                <h1 class="text-4xl font-bold heading-font text-gray-900">Iceland Field Guide</h1>
                <p class="text-gray-600 mt-4">Placeholder for your Iceland guide content.</p>
            </div>
        </section>

        <!-- SWITZERLAND & DOLOMITES... -->
        <!-- You can repeat the structure above for the others! -->

    </main>

    <script>
        function guideData() {
            return {
                currentSlide: 0,
                // ... (add all your original guideData logic here)
            }
        }

        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);
        window.addEventListener('load', () => {
            document.querySelectorAll(".gs-reveal").forEach(element => {
                gsap.fromTo(element, { y: 50, opacity: 0 }, { y: 0, opacity: 1, duration: 1, scrollTrigger: { trigger: element, start: "top 85%" } });
            });
        });
    </script>
</body>
</html>
