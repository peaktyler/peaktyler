<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Guides | Peak Tyler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #0f172a; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <header class="text-center mb-16 mt-10">
        <h1 class="text-white text-4xl md:text-6xl font-bold heading-font tracking-tight">PEAK TYLER</h1>
        <p class="text-gray-400 mt-4 uppercase tracking-widest text-sm">Select your field guide</p>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">

        <div x-data="{ active: 0, images: ['https://images.unsplash.com/photo-1464822759023-fed622ff2c3b', 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e'] }" class="bg-gray-900 rounded-3xl overflow-hidden border border-gray-800 hover:border-orange-500 transition-all group">
            <div class="relative h-64 overflow-hidden">
                <template x-for="(img, i) in images" :key="i">
                    <img :src="img" x-show="active === i" class="w-full h-full object-cover transition-opacity duration-500">
                </template>
                <button @click="active = (active === 0) ? 1 : 0" class="absolute bottom-4 right-4 bg-white/20 backdrop-blur-md text-white px-4 py-2 rounded-full text-xs font-bold uppercase">Next Pic</button>
            </div>
            <div class="p-6">
                <h2 class="text-white text-2xl font-bold heading-font">PNW Guide</h2>
                <p class="text-gray-400 mt-2 mb-6">40 days of Pacific Northwest routes, campsites, and photo spots.</p>
                <a href="PNW.html" class="block w-full text-center bg-white text-gray-900 font-bold py-3 rounded-xl hover:bg-orange-500 hover:text-white transition-colors">View Guide</a>
            </div>
        </div>

        <div x-data="{ active: 0, images: ['https://images.unsplash.com/photo-1520769945061-0a448c463865', 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e'] }" class="bg-gray-900 rounded-3xl overflow-hidden border border-gray-800 hover:border-orange-500 transition-all group">
            <div class="relative h-64 overflow-hidden">
                <template x-for="(img, i) in images" :key="i">
                    <img :src="img" x-show="active === i" class="w-full h-full object-cover transition-opacity duration-500">
                </template>
                <button @click="active = (active === 0) ? 1 : 0" class="absolute bottom-4 right-4 bg-white/20 backdrop-blur-md text-white px-4 py-2 rounded-full text-xs font-bold uppercase">Next Pic</button>
            </div>
            <div class="p-6">
                <h2 class="text-white text-2xl font-bold heading-font">Iceland Guide</h2>
                <p class="text-gray-400 mt-2 mb-6">Fire, ice, and everything in between. The ultimate road trip.</p>
                <a href="ICELAND.html" class="block w-full text-center bg-white text-gray-900 font-bold py-3 rounded-xl hover:bg-orange-500 hover:text-white transition-colors">View Guide</a>
            </div>
        </div>

        </div>

</body>
</html>
