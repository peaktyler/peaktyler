<!DOCTYPE html><html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNW Field Guide | Peak Tyler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap');

        body { font-family: 'Outfit', sans-serif; }
        h1, h2, h3, .heading-font { font-family: 'Space Grotesk', sans-serif; }

        /* Topo Map Background */
        .topo-bg {
            background-color: #f3f4f6;
            background-image: url("data:image/svg+xml,%3Csvg width='100%' height='100%' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='topoPattern' patternUnits='userSpaceOnUse' width='500' height='500' viewBox='0 0 500 500'%3E%3Cpath d='M0 250 Q 125 100, 250 250 Q 375 400, 500 250 M0 270 Q 125 120, 250 270 Q 375 420, 500 270 M0 230 Q 125 80, 250 230 Q 375 380, 500 230 M0 300 Q 125 150, 250 300 Q 375 450, 500 300 M0 200 Q 125 50, 250 200 Q 375 350, 500 200 M0 350 Q 125 200, 250 350 Q 375 500, 500 350 M0 150 Q 125 0, 250 150 Q 375 300, 500 150' stroke='%239ca3af' stroke-opacity='0.3' fill='none' stroke-width='1.5'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='100%' height='100%' fill='url(%23topoPattern)'/%3E%3C/svg%3E");
            background-size: 500px 500px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1f2937; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .text-shadow {
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="text-gray-800 topo-bg overflow-x-hidden" x-data="guideData()">

    <nav class="fixed top-0 w-full z-50 transition-all duration-300"
         x-data="{ mobileOpen: false, scrolled: false }"
         @scroll.window="scrolled = (window.pageYOffset > 50)"
         :class="scrolled ? 'bg-gray-900/95 backdrop-blur-md shadow-lg py-3' : 'bg-gray-900/80 backdrop-blur-md py-4'">

        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-white tracking-tighter flex items-center gap-3 group heading-font">
                <div class="w-8 h-8 border-2 border-white rounded-full flex items-center justify-center relative transition-transform duration-700 group-hover:rotate-180">
                    <div class="w-0 h-0 border-l-[3px] border-l-transparent border-r-[3px] border-r-transparent border-b-[10px] border-b-orange-600 mb-1"></div>
                </div>
                PEAK TYLER
            </a>

            <div class="hidden md:flex items-center gap-8">
                <a href="pnw.html" class="text-sm font-bold uppercase tracking-widest text-orange-500 hover:text-orange-400 transition-colors">PNW</a>
                <a href="iceland.html" class="text-sm font-bold uppercase tracking-widest text-gray-300 hover:text-orange-500 transition-colors">Iceland</a>
                <a href="switzerland.html" class="text-sm font-bold uppercase tracking-widest text-gray-300 hover:text-orange-500 transition-colors">Switzerland</a>
                <a href="#buy" class="bg-orange-600 hover:bg-orange-700 text-white text-sm font-bold uppercase tracking-widest px-5 py-2 rounded-full transition-all transform hover:-translate-y-0.5">
                    Get the Guide
                </a>
            </div>

            <button @click="mobileOpen = !mobileOpen" class="md:hidden text-white focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>

        <div x-show="mobileOpen"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0"
             @click.away="mobileOpen = false"
             class="md:hidden absolute top-full left-0 w-full bg-gray-900 border-t border-gray-800 p-6 flex flex-col gap-4 shadow-xl">
            <a href="pnw.html" @click="mobileOpen = false" class="text-lg font-bold text-orange-500 border-b border-gray-800 pb-2">PNW</a>
            <a href="iceland.html" @click="mobileOpen = false" class="text-lg font-bold text-white hover:text-orange-500 border-b border-gray-800 pb-2">Iceland</a>
            <a href="switzerland.html" @click="mobileOpen = false" class="text-lg font-bold text-white hover:text-orange-500 border-b border-gray-800 pb-2">Switzerland</a>
            <a href="#buy" @click="mobileOpen = false" class="text-lg font-bold text-orange-500">Get the Guide</a>
        </div>
    </nav>

    <main class="pt-28 pb-16 px-4 md:px-6 max-w-7xl mx-auto">
        <div class="grid lg:grid-cols-[380px_1fr_340px] gap-6 lg:gap-8 items-start">

            <section class="lg:sticky lg:top-28 gs-reveal" aria-label="Guide preview">
                <div class="bg-gray-900 rounded-2xl overflow-hidden shadow-xl border border-gray-800">

                    <div class="relative h-80 md:h-96 bg-gray-800">
                        <template x-for="(slide, i) in media" :key="i">
                            <div x-show="currentSlide === i"
                                 x-transition:enter="transition ease-out duration-500"
                                 x-transition:enter-start="opacity-0"
                                 x-transition:enter-end="opacity-100"
                                 class="absolute inset-0">
                                <img :src="slide.image" :alt="slide.caption" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent"></div>
                                <div class="absolute bottom-0 left-0 p-5">
                                    <span class="text-xs font-bold text-orange-400 uppercase tracking-wider" x-text="slide.label"></span>
                                    <p class="text-white font-bold text-lg heading-font" x-text="slide.caption"></p>
                                </div>
                            </div>
                        </template>

                        <button @click="prevSlide()" class="absolute left-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-black/40 hover:bg-orange-600 text-white flex items-center justify-center transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button @click="nextSlide()" class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-black/40 hover:bg-orange-600 text-white flex items-center justify-center transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>

                    <div class="flex gap-2 p-3 bg-gray-900">
                        <template x-for="(slide, i) in media" :key="'thumb'+i">
                            <button @click="currentSlide = i"
                                    class="flex-1 h-16 rounded-lg overflow-hidden border-2 transition-all"
                                    :class="currentSlide === i ? 'border-orange-600 opacity-10
