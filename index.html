<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Guide | Peak Tyler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .topo-bg { background-color: #f3f4f6; }
    </style>
</head>
<body class="topo-bg" x-data="{ currentView: 'PNW' }">

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 bg-gray-900/90 backdrop-blur-md py-4">
        <div class="flex justify-center gap-6">
            <button @click="currentView = 'PNW'" :class="currentView === 'PNW' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm">PNW</button>
            <button @click="currentView = 'ICELAND'" :class="currentView === 'ICELAND' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm">Iceland</button>
            <button @click="currentView = 'SWITZERLAND'" :class="currentView === 'SWITZERLAND' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm">Switzerland</button>
            <button @click="currentView = 'DOLOMITES'" :class="currentView === 'DOLOMITES' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm">Dolomites</button>
        </div>
    </nav>

    <!-- CONTENT AREAS -->
    <main class="pt-28 pb-16 px-4 max-w-3xl mx-auto">
        
        <!-- PNW SECTION -->
        <div x-show="currentView === 'PNW'">
            <h1 class="text-4xl font-bold heading-font">PNW Field Guide</h1>
            <p class="mt-4">This is your PNW guide content. You can paste all your original itinerary details here.</p>
        </div>

        <!-- ICELAND SECTION -->
        <div x-show="currentView === 'ICELAND'">
            <h1 class="text-4xl font-bold heading-font">Iceland Field Guide</h1>
            <p class="mt-4">This is your Iceland guide content.</p>
        </div>

        <!-- SWITZERLAND SECTION -->
        <div x-show="currentView === 'SWITZERLAND'">
            <h1 class="text-4xl font-bold heading-font">Switzerland Field Guide</h1>
            <p class="mt-4">This is your Switzerland guide content.</p>
        </div>

        <!-- DOLOMITES SECTION -->
        <div x-show="currentView === 'DOLOMITES'">
            <h1 class="text-4xl font-bold heading-font">Dolomites Field Guide</h1>
            <p class="mt-4">This is your Dolomites guide content.</p>
        </div>

    </main>
</body>
</html>
