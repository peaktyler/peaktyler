<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Guide | Peak Tyler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="topo-bg" x-data="{ currentView: 'PNW' }">

    <!-- NAV -->
    <nav class="fixed top-0 w-full z-50 bg-gray-900/90 backdrop-blur-md py-4">
        <div class="flex justify-center gap-6">
            <button @click="currentView = 'PNW'" :class="currentView === 'PNW' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm">PNW</button>
            <button @click="currentView = 'ICELAND'" :class="currentView === 'ICELAND' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm">Iceland</button>
            <button @click="currentView = 'SWITZERLAND'" :class="currentView === 'SWITZERLAND' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm">Switzerland</button>
            <button @click="currentView = 'DOLOMITES'" :class="currentView === 'DOLOMITES' ? 'text-orange-500' : 'text-gray-300'" class="font-bold uppercase tracking-widest text-sm">Dolomites</button>
        </div>
    </nav>

    <!-- CONTENT AREAS -->
    <main class="pt-28 pb-16 px-4 max-w-3xl mx-auto">
        
        <div x-show="currentView === 'PNW'">
            <h1 class="text-4xl font-bold">PNW Guide</h1>
            <p>Welcome to the PNW section. Edit this text once here, and it updates everywhere.</p>
        </div>

        <div x-show="currentView === 'ICELAND'">
            <h1 class="text-4xl font-bold">Iceland Guide</h1>
            <p>Welcome to the Iceland section.</p>
        </div>

        <div x-show="currentView === 'SWITZERLAND'">
            <h1 class="text-4xl font-bold">Switzerland Guide</h1>
            <p>Welcome to the Switzerland section.</p>
        </div>

        <div x-show="currentView === 'DOLOMITES'">
            <h1 class="text-4xl font-bold">Dolomites Guide</h1>
            <p>Welcome to the Dolomites section.</p>
        </div>

    </main>
</body>
</html>
