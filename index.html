<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Guides | Peak Tyler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .topo-bg { 
            background-color: #f3f4f6; 
            background-image: url("data:image/svg+xml,%3Csvg width='100%' height='100%' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='topoPattern' patternUnits='userSpaceOnUse' width='500' height='500' viewBox='0 0 500 500'%3E%3Cpath d='M0 250 Q 125 100, 250 250 Q 375 400, 500 250 M0 270 Q 125 120, 250 270 Q 375 420, 500 270 M0 230 Q 125 80, 250 230 Q 375 380, 500 230 M0 300 Q 125 150, 250 300 Q 375 450, 500 300 M0 200 Q 125 50, 250 200 Q 375 350, 500 200 M0 350 Q 125 200, 250 350 Q 375 500, 500 350 M0 150 Q 125 0, 250 150 Q 375 300, 500 150' stroke='%239ca3af' stroke-opacity='0.3' fill='none' stroke-width='1.5'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='100%' height='100%' fill='url(%23topoPattern)'/%3E%3C/svg%3E"); 
        }
    </style>
</head>
<body class="topo-bg min-h-screen p-6 md:p-12">

    <!-- Header -->
    <header class="text-center mb-10">
        <h1 class="text-gray-900 text-4xl font-bold heading-font tracking-tight">PEAK TYLER</h1>
        <p class="text-gray-500 mt-2 uppercase tracking-widest text-xs font-bold">Select your field guide</p>
    </header>

    <!-- 4-Column Grid -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        <!-- Block 1: PNW -->
        <div x-data="{ active: 0, images: ['https://images.unsplash.com/photo-1464822759023-fed622ff2c3b', 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e'] }" class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden hover:shadow-lg transition-shadow">
            <!-- Link wrapper for the whole image area -->
            <a href="PNW.html" class="block relative h-48 overflow-hidden">
                <template x-for="(img, i) in images" :key="i">
                    <img :src="img" x-show="active === i" class="w-full h-full object-cover">
                </template>
            </a>
            <!-- Arrow buttons (Added @click.stop to prevent link trigger) -->
            <button @click.stop="active = (active === 0) ? images.length - 1 : active - 1" class="absolute left-6 mt-[-120px] bg-white/80 p-1.5 rounded-full shadow hover:bg-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
            <button @click.stop="active = (active === images.length - 1) ? 0 : active + 1" class="absolute left-[130px] mt-[-120px] bg-white/80 p-1.5 rounded-full shadow hover:bg-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
            
            <div class="p-5">
                <h2 class="text-gray-900 font-bold heading-font">PNW</h2>
                <a href="PNW.html" class="mt-4 block w-full text-center bg-gray-900 text-white text-sm font-bold py-2 rounded-lg hover:bg-orange-600 transition-colors">View Guide</a>
            </div>
        </div>

        <!-- Block 2: ICELAND (Repeat this for others) -->
        <div x-data="{ active: 0, images: ['https://images.unsplash.com/photo-1520769945061-0a448c463865', 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e'] }" class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden hover:shadow-lg transition-shadow">
            <a href="ICELAND.html" class="block relative h-48 overflow-hidden">
                <template x-for="(img, i) in images" :key="i">
                    <img :src="img" x-show="active === i" class="w-full h-full object-cover">
                </template>
            </a>
            <button @click.stop="active = (active === 0) ? images.length - 1 : active - 1" class="absolute left-[330px] mt-[-120px] bg-white/80 p-1.5 rounded-full shadow hover:bg-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
            <button @click.stop="active = (active === images.length - 1) ? 0 : active + 1" class="absolute left-[450px] mt-[-120px] bg-white/80 p-1.5 rounded-full shadow hover:bg-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>

            <div class="p-5">
                <h2 class="text-gray-900 font-bold heading-font">Iceland</h2>
                <a href="ICELAND.html" class="mt-4 block w-full text-center bg-gray-900 text-white text-sm font-bold py-2 rounded-lg hover:bg-orange-600 transition-colors">View Guide</a>
            </div>
        </div>

    </div>

</body>
</html>
